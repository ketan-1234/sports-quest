server:
  port: ${PORT:8282}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sports_center}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:connectme@mysqlK787}

  application:
    name: SportsCenter

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}